sac:
  learning_rate: 7.0e-4
  buffer_size: 200000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 32
  gradient_steps: 32
  learning_starts: 2000
  net_arch: [256, 256, 256]

training:
  total_timesteps: 500000
  log_dir: ./logs/isaac_expert
  save_dir: ./checkpoints
  save_freq: 25000
  checkpoint_every_seconds: 3600
  eval_freq: 10000
  eval_episodes: 10
  n_envs: 1  # Single Isaac Sim instance

reward:
  progress_weight: 4.0
  heading_penalty: 0.6
  obstacle_penalty: 1.2
  d_safe: 0.06
  near_goal_weight: 0.6
  near_goal_scale: 0.12
  time_penalty: 0.002
  stagnation_penalty: 0.01
  goal_bonus: 5.0
  collision_penalty: 10.0

env_config: brace_kinova/configs/isaac_env.yaml
scenario: collision_avoidance

seed: 42
device: cuda:0
