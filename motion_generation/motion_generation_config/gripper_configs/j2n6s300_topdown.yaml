# Replicator GraspingManager config for Kinova JACO2 (j2n6s300) - Top-down grasps
# Notes:
# - You can override gripper_path via CLI: --rep-gripper-prim-path
# - sampler_config must include a valid sampler_type recognized by Replicator

gripper_path: /World/Origin1/kinova_j2n6s300/j2n6s300_end_effector

sampler_config:
  sampler_type: topdown
  # Approach direction in world frame; (-Z world) means gripper pointing downward
  approach_axis: [0.0, 0.0, -1.0]
  approach_offset_m: 0.10
  retreat_offset_m: 0.15
  min_clearance_m: 0.01
  max_roll_deg: 10.0

# Optional gripper geometry (used by some samplers/checkers). Tune as needed.
gripper:
  width_open_m: 0.09
  width_close_m: 0.00
  finger_length_m: 0.06
  contact_padding_m: 0.005



