## Simple cuRobo world config (base-frame) for interactive collision-avoidance demos.
##
## Coordinates are in the robot base frame.
## In the Isaac scene used by this repo, the robot base is mounted on a table at z~0.8m in world.
## The demo's --spawn-primitives option spawns matching visible cuboids in the sim.
##
cuboid:
  blocker_1:
    dims: [0.10, 0.10, 0.20]   # (x,y,z) meters
    pose: [0.45, 0.00, 0.10, 1.0, 0.0, 0.0, 0.0]  # (x,y,z,qw,qx,qy,qz)
  blocker_2:
    dims: [0.08, 0.20, 0.12]
    pose: [0.40, -0.15, 0.08, 1.0, 0.0, 0.0, 0.0]

